<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>T'SUKI sur la mer — おもてなしは「東京」という街のエレガンス</title>
<meta name="description" content="T'SUKI sur la mer（ツキシュールラメール）— 東京湾を望む貸し切り一軒家レストランウエディング。「東京」という街のエレガンスを贈る、最高のおもてなし。挙式・披露宴・お料理・ドレス・ブライダルフェアのご案内。">
<link rel="canonical" href="https://example.com/">
<meta property="og:type" content="website">
<meta property="og:title" content="T'SUKI sur la mer — おもてなしは「東京」という街のエレガンス">
<meta property="og:description" content="東京湾を望む貸し切り一軒家レストランウエディング。「東京」という街のエレガンスを贈る最高のおもてなし。">
<meta property="og:image" content="https://example.com/assets/og.jpg">
<meta property="og:locale" content="ja_JP">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Italiana&family=Manrope:wght@300;400;500;600&family=Shippori+Mincho:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --night: #0E1A2B;
    --night-2: #14253B;
    --cream: #F1F1F2;
    --cream-2: #E6E6E8;
    --moon: #E3E3E5;
    --gold: #8C6D2B;
    --gold-soft: #C8AE82;
    --ink: #1B2433;
    --hair: rgba(255,255,255,0.18);
    --hair-dark: rgba(14,26,43,0.14);
    --serif: 'Cormorant Garamond', 'Shippori Mincho', serif;
    --display: 'Italiana', 'Cormorant Garamond', serif;
    --sans: 'Manrope', 'Noto Sans JP', sans-serif;
    --jp: 'Shippori Mincho', 'Noto Serif JP', serif;
  }
  html{ --gold: #8C6D2B !important; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#FFFFFF;color:var(--ink);font-family:var(--sans);font-weight:300;-webkit-font-smoothing:antialiased;line-height:1.7;font-feature-settings:"palt"}
  img,svg{display:block;max-width:100%}
  a{color:inherit;text-decoration:none}
  button{font:inherit;background:none;border:none;cursor:pointer;color:inherit}
  ::selection{background:var(--gold);color:var(--cream)}

  /* ---------- Header ---------- */
  .nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:18px 36px;transition:all .5s ease;mix-blend-mode:difference;color:#fff}
  .nav.solid{mix-blend-mode:difference;background:transparent;backdrop-filter:none;color:#fff;border-bottom:0}
  .nav.menu-open{mix-blend-mode:normal;background:transparent;backdrop-filter:none;border-bottom:0;color:var(--cream)}
  .brand{display:flex;flex-direction:column;line-height:1;letter-spacing:.18em}
  .brand .b1{font-family:var(--display);font-size:18px;letter-spacing:.32em}
  .brand .b2{font-family:var(--sans);font-size:9px;letter-spacing:.45em;opacity:.7;margin-top:6px}
  .nav-links{display:flex;gap:34px;font-family:var(--sans);font-size:11px;letter-spacing:.32em;text-transform:uppercase}
  .nav-links a{position:relative;padding:6px 0}
  .nav-links a::after{content:"";position:absolute;left:0;right:100%;bottom:0;height:1px;background:currentColor;transition:right .4s ease}
  .nav-links a:hover::after{right:0}
  .nav-cta{display:flex;align-items:center;gap:18px;font-family:var(--sans);font-size:10px;letter-spacing:.3em;text-transform:uppercase}
  .nav-cta .pill{border:1px solid currentColor;padding:10px 18px;border-radius:999px;transition:all .3s}
  .nav-cta .pill:hover{background:var(--gold);border-color:var(--gold);color:var(--cream)}
  .lang{display:flex;gap:6px;align-items:center;font-size:10px;letter-spacing:.2em}
  .lang .sep{opacity:.4}

  /* hamburger */
  .nav-burger{display:none;flex-direction:column;justify-content:center;gap:5px;width:30px;height:30px;background:none;border:0;padding:0;cursor:pointer;z-index:2}
  .nav-burger span{display:block;width:26px;height:1.5px;background:currentColor;transition:transform .4s ease, opacity .3s ease}
  .nav-burger.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
  .nav-burger.open span:nth-child(2){opacity:0}
  .nav-burger.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}

  /* full-screen mobile menu */
  .mobile-menu{position:fixed;inset:0;z-index:45;background:#FFFFFF;color:var(--ink);
    opacity:0;visibility:hidden;transition:opacity .55s ease, visibility .55s ease;
    display:flex;align-items:center;justify-content:center}
  .mobile-menu::before{content:"";position:absolute;inset:0;
    background:radial-gradient(120% 80% at 80% 0%, rgba(140,109,43,0.06), transparent 55%);pointer-events:none}
  .mobile-menu.open{opacity:1;visibility:visible}
  .mm-inner{position:relative;width:100%;max-width:480px;padding:0 40px;display:flex;flex-direction:column;gap:54px}
  .mm-mark{font-family:var(--display);font-size:20px;letter-spacing:.32em;text-align:center;color:var(--gold)}
  .mm-mark span{display:block;font-family:var(--sans);font-size:9px;letter-spacing:.5em;text-transform:uppercase;opacity:.6;margin-top:8px;color:var(--ink)}
  .mm-links{display:flex;flex-direction:column;gap:4px}
  .mm-links a{display:flex;align-items:center;justify-content:center;gap:20px;
    padding:16px 0;
    opacity:0;transform:translateY(14px);transition:opacity .5s ease, transform .5s ease}
  .mobile-menu.open .mm-links a{opacity:1;transform:translateY(0)}
  .mm-links .mm-en{font-family:var(--display);font-size:26px;font-weight:300;letter-spacing:.06em;color:var(--ink)}
  .mm-foot{display:flex;flex-direction:column;align-items:center;gap:24px}
  .mm-pill{border:1px solid var(--ink);color:var(--ink);padding:15px 40px;border-radius:999px;
    font-family:var(--sans);font-size:11px;letter-spacing:.34em;text-transform:uppercase}
  .mm-lang{display:flex;gap:8px;font-family:var(--sans);font-size:11px;letter-spacing:.25em}
  .mm-lang .on{color:var(--gold)}
  .mm-lang .sep{opacity:.4}
  .lang .on{font-weight:500}

  /* ---------- Hero ---------- */
  .hero{position:relative;height:100vh;min-height:780px;color:var(--cream);overflow:hidden;background:var(--night)}
  .hero-bg{position:absolute;inset:0;z-index:0;background:
    radial-gradient(120% 80% at 70% 25%, rgba(184,153,104,0.22), transparent 55%),
    radial-gradient(80% 60% at 20% 90%, rgba(20,37,59,0.9), transparent 70%),
    linear-gradient(180deg, #06101D 0%, #0E1A2B 40%, #1A2E47 90%);
  }
  .hero-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
  .hero-tint{position:absolute;inset:0;z-index:1;background:
    linear-gradient(180deg, rgba(6,16,29,0.45) 0%, rgba(6,16,29,0.15) 35%, rgba(6,16,29,0.55) 80%, rgba(6,16,29,0.85) 100%),
    radial-gradient(120% 80% at 70% 25%, rgba(184,153,104,0.18), transparent 55%);
    pointer-events:none}
  .hero-stars{position:absolute;inset:0;opacity:.35;z-index:1;pointer-events:none}
  .hero-photo{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;z-index:1;pointer-events:none}
  .hero-photo .ph{width:100%;height:30%;background:linear-gradient(180deg, transparent 0%, rgba(14,26,43,0.0) 30%, rgba(14,26,43,0.65) 100%);
  }
  .moon{position:absolute;top:12%;right:10%;width:260px;height:260px;border-radius:50%;z-index:2;mix-blend-mode:screen;opacity:.85;
    background:radial-gradient(circle at 35% 35%, #F6EFE0 0%, #E8DDC4 40%, #C9B98E 70%, #8B7A52 100%);
    box-shadow:0 0 90px rgba(232,221,196,0.35), inset -30px -40px 70px rgba(20,30,50,0.4);
    filter:blur(.3px)}
  .moon::after{content:"";position:absolute;inset:-40px;border-radius:50%;border:1px solid rgba(232,221,196,0.18)}

  .hero-content{position:relative;z-index:3;height:100%;display:grid;grid-template-rows:1fr auto;padding:140px 56px 48px}
  .video-toggle{position:absolute;right:36px;bottom:48px;z-index:4;display:flex;align-items:center;gap:10px;font-family:var(--sans);font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--cream);opacity:.7;transition:opacity .3s}
  .video-toggle:hover{opacity:1}
  .video-toggle .dot{width:8px;height:8px;border-radius:50%;background:var(--cream);box-shadow:0 0 0 1px rgba(244,239,230,.4)}
  .video-toggle.muted .dot{background:transparent;box-shadow:inset 0 0 0 1px var(--cream)}
  .hero-eyebrow{font-family:var(--sans);font-size:10px;letter-spacing:.55em;text-transform:uppercase;opacity:.75;display:flex;align-items:center;gap:14px}
  .hero-eyebrow::before{content:"";width:38px;height:1px;background:currentColor;opacity:.5}
  .hero-title{margin-top:auto;font-family:var(--display);font-weight:300;font-size:clamp(56px, 9vw, 148px);letter-spacing:.04em;line-height:.95}
  .hero-title em{font-style:italic;font-family:var(--serif);font-weight:300;display:inline-block;transform:translateY(-.04em)}
  .hero-sub{margin-top:28px;font-family:var(--jp);font-size:15px;letter-spacing:.42em;opacity:.85}
  .hero-foot{display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid var(--hair);padding-top:22px;margin-top:60px}
  .hero-foot-l{font-family:var(--jp);font-size:13px;letter-spacing:.32em;opacity:.85;max-width:46ch}
  .hero-foot-r{font-family:var(--sans);font-size:10px;letter-spacing:.35em;text-transform:uppercase;opacity:.7;text-align:right}
  .scroll-cue{position:absolute;left:56px;bottom:48px;font-family:var(--sans);font-size:10px;letter-spacing:.4em;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:10px;opacity:.7}
  .scroll-cue .line{width:1px;height:60px;background:linear-gradient(180deg, currentColor 0%, transparent 100%);animation:drop 2.4s ease-in-out infinite}
  @keyframes drop{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}51%{transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}

  /* tiny stars */
  .star{position:absolute;width:1px;height:1px;background:#fff;border-radius:50%;opacity:.7}
  .star.lg{width:2px;height:2px;opacity:.9;box-shadow:0 0 6px rgba(255,255,255,.6)}

  .hero-mcap{display:none}

  /* ---------- Section base ---------- */
  section{position:relative}
  .wrap{max-width:1320px;margin:0 auto;padding:0 56px}
  .eyebrow{font-family:var(--sans);color:var(--gold);display:inline-flex;align-items:center;gap:16px}
  .eyebrow::before{content:"";width:52px;height:1px;background:currentColor;opacity:.7;flex:0 0 auto}
  .eyebrow::after{content:"";width:52px;height:1px;background:currentColor;opacity:.7;flex:0 0 auto}
  .eyebrow .ch-en{font-size:18px;letter-spacing:.34em;text-transform:uppercase;font-weight:600;line-height:1}
  .eyebrow .ch-jp{font-family:var(--jp);font-size:14.5px;letter-spacing:.22em;line-height:1;font-weight:500;opacity:.95}
  .h-en{font-family:var(--display);font-weight:300;font-size:clamp(20px,2.2vw,32px);line-height:1.2;letter-spacing:.1em;opacity:.9}
  .h-en em{font-family:var(--serif);font-style:italic}
  .h-jp{font-family:var(--jp);font-weight:500;font-size:clamp(28px,3.6vw,48px);letter-spacing:.13em;line-height:1.6}
  .body-jp{font-family:var(--jp);font-size:15px;letter-spacing:.12em;line-height:2.2;color:#3a4150}

  /* ---------- Concept ---------- */
  /* photo frame block — with overlay text */
  .concept{position:relative;background:#FFFFFF;padding:160px 0 140px}
  .concept .frame{max-width:1480px;margin:0 auto;padding:0 56px;position:relative}
  .concept .photo{aspect-ratio:16/9;width:100%;background-image:url('assets/concept-bg.jpg');background-size:cover;background-position:center;position:relative;box-shadow:0 24px 60px -30px rgba(20,12,4,0.35);overflow:hidden}
  .concept .photo::after{content:"";position:absolute;inset:0;background:
    linear-gradient(180deg, rgba(10,6,2,0.55) 0%, rgba(10,6,2,0.18) 28%, rgba(10,6,2,0.05) 55%, rgba(10,6,2,0.55) 100%),
    linear-gradient(90deg, rgba(10,6,2,0.55) 0%, rgba(10,6,2,0.05) 55%, transparent 100%);
    pointer-events:none}
  .concept .overlay{position:absolute;inset:0;z-index:2;display:grid;grid-template-columns:0.68fr 1.32fr;gap:40px;padding:clamp(40px,5vw,80px) clamp(40px,5vw,80px);align-items:end;color:var(--cream)}
  .concept .overlay > div:first-child{align-self:start}
  .concept .overlay > div:last-child{align-self:end}
  .concept .overlay .vlabel{position:absolute;left:clamp(20px,2.5vw,40px);top:clamp(36px,4vw,60px);writing-mode:vertical-rl;font-family:var(--jp);font-size:12px;letter-spacing:.6em;color:var(--gold-soft)}
  .concept .overlay .eyebrow{color:var(--gold-soft)}
  .concept .overlay .eyebrow::before{color:var(--gold-soft)}
  .concept .overlay .h-en{color:var(--cream);margin-top:14px;font-size:clamp(20px,2vw,30px);font-weight:300;letter-spacing:.1em;line-height:1.2;opacity:.92;text-shadow:0 2px 30px rgba(0,0,0,0.45)}
  .concept .overlay .rule{display:flex;align-items:center;gap:18px;margin-top:36px;font-family:var(--jp);font-size:12px;letter-spacing:.45em;color:rgba(244,239,230,.7)}
  .concept .overlay .rule .line{flex:0 0 60px;height:1px;background:var(--gold-soft)}
  .concept .overlay .jp{font-family:var(--jp);font-size:clamp(26px,2.9vw,40px);font-weight:500;letter-spacing:.02em;line-height:1.65;color:var(--cream);text-shadow:0 2px 24px rgba(0,0,0,0.55)}
  .concept .overlay .jp .accent{color:var(--gold-soft)}

  .concept .photo-cap{display:flex;justify-content:space-between;align-items:baseline;margin-top:18px;font-family:var(--sans);font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:#7b8294}
  .concept .photo-cap .l{display:flex;align-items:center;gap:14px}
  .concept .photo-cap .l::before{content:"";width:32px;height:1px;background:var(--gold)}
  .concept .photo-cap em{font-family:var(--display);font-style:italic;text-transform:none;letter-spacing:.08em;color:var(--gold);font-size:14px}

  /* story area below photo */
  .concept .story-wrap{max-width:1480px;margin:80px auto 0;padding:0 56px;display:grid;grid-template-columns:1fr 1.2fr;gap:80px;align-items:stretch}
  .concept .story-wrap > .fade:first-child{display:flex;flex-direction:column}
  .concept .quote-jp{font-family:var(--jp);font-size:clamp(22px,2vw,30px);line-height:2.05;letter-spacing:.14em;color:var(--ink);font-weight:400}
  .concept .quote-jp .accent{color:var(--gold)}
  .concept .story-btn{color:var(--ink);border-color:var(--ink)}
  .concept .story-btn:hover{color:var(--gold);border-color:var(--gold)}
  .concept .body-jp{color:#3a4150}
  /* story — always shown, poetic reading block */
  .concept .story-read{max-width:30em}
  .concept .story-read .quote-jp{margin-bottom:1.4em}
  .concept .story-label{display:flex;align-items:center;gap:16px;font-family:var(--sans);font-size:10px;letter-spacing:.45em;text-transform:uppercase;color:var(--gold);margin-bottom:30px}
  .concept .story-label .line{width:42px;height:1px;background:var(--gold)}
  .concept .story-read .body-jp{font-family:var(--jp);font-size:17px;line-height:2.5;letter-spacing:.12em;color:#3a4150;margin-bottom:1.7em}
  .concept .story-read .lead{font-size:17px;line-height:2.5;color:var(--ink);letter-spacing:.12em}
  /* compact info inside Story */
  .info-compact{margin-top:32px;padding-top:24px;border-top:1px solid var(--hair-dark);display:flex;flex-direction:column;gap:12px}
  .info-compact > div{display:grid;grid-template-columns:90px 1fr;gap:18px;align-items:baseline}
  .info-compact dt{font-family:var(--display);font-style:italic;font-size:14px;letter-spacing:.18em;color:var(--gold);text-transform:lowercase}
  .info-compact dd{font-family:var(--jp);font-size:13px;letter-spacing:.12em;color:#3a4150;line-height:1.8}
  .info-static{margin-top:40px}
  .concept .info-table{margin:auto 0;border:1px solid var(--hair-dark);background:rgba(184,153,104,0.035)}
  .concept .info-table-head{display:flex;align-items:baseline;gap:16px;padding:15px 22px;border-bottom:1px solid var(--hair-dark)}
  .concept .it-label{font-family:var(--sans);font-size:10px;letter-spacing:.42em;text-transform:uppercase;color:var(--gold)}
  .concept .it-jp{font-family:var(--jp);font-size:12px;letter-spacing:.3em;color:#7b8294}
  .concept .it-list{margin:0;padding:0}
  .concept .it-row{display:grid;grid-template-columns:108px 1fr;gap:18px;align-items:baseline;padding:14px 22px;border-bottom:1px solid var(--hair-dark)}
  .concept .it-row:last-child{border-bottom:none}
  .concept .it-row dt{font-family:var(--display);font-style:italic;font-size:15px;letter-spacing:.16em;color:var(--gold);text-transform:lowercase}
  .concept .it-row dd{margin:0;font-family:var(--jp);font-size:13.5px;letter-spacing:.12em;line-height:1.7;color:#3a4150}

  @media (max-width: 980px){
    .concept{padding:46px 0 72px}
    .concept .frame{padding:0}
    /* photo on top, text below — readable on mobile */
    .concept .photo{aspect-ratio:auto;background:none;box-shadow:none;overflow:visible}
    .concept .photo::after{display:none}
    .concept .photo::before{content:"";display:block;width:100%;height:64vw;max-height:430px;
      background-image:url('assets/concept-bg.jpg');background-size:cover;background-position:center}
    .concept .overlay{position:static;display:block;color:var(--ink);padding:30px 24px 0;text-shadow:none}
    .concept .overlay > div:first-child,.concept .overlay > div:last-child{align-self:auto}
    .concept .overlay .vlabel{display:none}
    .concept .overlay .eyebrow{color:var(--gold);gap:10px}
    .concept .overlay .eyebrow .ch-en{font-size:13px;letter-spacing:.28em}
    .concept .overlay .eyebrow .ch-jp{font-size:12px}
    .concept .overlay .h-en{color:var(--ink);opacity:1;text-shadow:none;font-size:21px;margin-top:10px;letter-spacing:.04em}
    .concept .overlay .rule{color:#7b8294;margin-top:16px;font-size:11px;letter-spacing:.2em;gap:12px;flex-wrap:wrap}
    .concept .overlay .rule .line{flex:0 0 32px;background:var(--gold)}
    .concept .overlay .jp{color:var(--ink);text-shadow:none;font-size:24px;line-height:1.7;letter-spacing:.02em;margin-top:24px}
    .concept .overlay .jp .accent{color:var(--gold)}
    .concept .story-wrap{display:flex;flex-direction:column;margin-top:54px;padding:0 24px;gap:48px}
    .concept .story-wrap > .fade:first-child{order:2}
    .concept .story-wrap > .fade.d1{order:1}
    .concept .story-read .quote-jp{font-size:21px;line-height:1.85;letter-spacing:.06em;margin-bottom:1.1em}
    .concept .story-read .body-jp,
    .concept .story-read .lead{font-size:14px;line-height:2.15;letter-spacing:.06em;margin-bottom:1.4em}
    .concept .story-label{margin-bottom:20px;font-size:9.5px;letter-spacing:.4em}
  }
  /* basic info — over image */
  .basic-collapse{max-height:0;overflow:hidden;transition:max-height .9s ease, margin-top .9s ease, opacity .8s ease;opacity:0;margin-top:0}
  .basic-collapse[data-open="true"]{max-height:480px;margin-top:96px;opacity:1}
  .concept .basic{margin-top:0;border-top:1px solid rgba(244,239,230,.22);border-bottom:1px solid rgba(244,239,230,.22);background:rgba(10,6,2,0.28);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
  /* compact info inside Story */
  .info-compact{margin-top:28px;padding-top:24px;border-top:1px solid rgba(244,239,230,.25);display:flex;flex-direction:column;gap:12px}
  .info-compact > div{display:grid;grid-template-columns:90px 1fr;gap:18px;align-items:baseline}
  .info-compact dt{font-family:var(--display);font-style:italic;font-size:14px;letter-spacing:.18em;color:var(--gold-soft);text-transform:lowercase}
  .info-compact dd{font-family:var(--jp);font-size:13px;letter-spacing:.12em;color:rgba(244,239,230,.88);line-height:1.8}
  .concept .basic .cell{border-right:1px solid rgba(244,239,230,.18)}
  .concept .basic .cell:last-child{border-right:none}
  .concept .basic .k{color:var(--gold-soft)}
  .concept .basic .v{color:var(--cream);font-family:var(--jp)}
  .concept .basic .num{color:var(--cream)}
  .concept-grid{display:grid;grid-template-columns:1fr 1.05fr;gap:88px;align-items:start}
  .vertical-label{writing-mode:vertical-rl;font-family:var(--jp);font-size:12px;letter-spacing:.6em;color:var(--gold);position:absolute;left:18px;top:160px}
  .concept .h-en{margin-top:18px;margin-bottom:28px}
  .quote-jp{font-family:var(--jp);font-size:clamp(24px,2.4vw,34px);line-height:2.1;letter-spacing:.14em;color:var(--ink);font-weight:400}
  .quote-jp .accent{color:var(--gold)}
  .story-btn{margin-top:48px;display:inline-flex;align-items:center;gap:14px;font-family:var(--sans);font-size:11px;letter-spacing:.4em;text-transform:uppercase;border-bottom:1px solid var(--ink);padding:0 4px 8px;transition:all .35s}
  .story-btn:hover{color:var(--gold);border-color:var(--gold)}
  .story-btn .arrow{display:inline-block;width:24px;height:1px;background:currentColor;position:relative;transition:transform .35s}
  .story-btn .arrow::after{content:"";position:absolute;right:0;top:-3px;width:7px;height:7px;border-right:1px solid currentColor;border-top:1px solid currentColor;transform:rotate(45deg)}
  .story-btn[data-open="true"] .arrow{transform:rotate(90deg)}
  .story-body{max-height:0;overflow:hidden;transition:max-height .8s ease;margin-top:0}
  .story-body[data-open="true"]{max-height:2000px;margin-top:36px}
  .story-body p{margin-bottom:1.6em}

  /* basic info */
  .basic{margin-top:120px;display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--hair-dark);border-bottom:1px solid var(--hair-dark)}
  .basic .cell{padding:36px 30px;border-right:1px solid var(--hair-dark);display:flex;flex-direction:column;gap:10px}
  .basic .cell:last-child{border-right:none}
  .basic .k{font-family:var(--display);font-size:14px;letter-spacing:.4em;color:var(--gold);text-transform:lowercase}
  .basic .v{font-family:var(--jp);font-size:16px;letter-spacing:.1em;line-height:1.8}
  .basic .num{font-family:var(--display);font-size:38px;letter-spacing:.04em;font-style:italic}

  /* ---------- Banquet ---------- */
  .banquet{background:#FFFFFF;color:var(--ink);padding:160px 0 160px;position:relative;overflow:hidden}
  .banquet .frame{max-width:1480px;margin:0 auto;padding:0 56px;position:relative}
  .banquet .photo{aspect-ratio:16/9;width:100%;background-image:url('assets/banquet.jpg');background-size:cover;background-position:center;position:relative;box-shadow:0 24px 60px -30px rgba(20,12,4,0.35);overflow:hidden}
  .banquet .photo::after{content:"";position:absolute;inset:0;background:
    linear-gradient(180deg, rgba(8,18,32,0.45) 0%, rgba(8,18,32,0.08) 30%, transparent 55%, rgba(8,18,32,0.4) 100%),
    linear-gradient(90deg, rgba(8,18,32,0.05) 0%, transparent 35%, rgba(8,18,32,0.35) 100%);
    pointer-events:none}
  .banquet .overlay{position:absolute;inset:0;z-index:2;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto 1fr;gap:30px 40px;padding:clamp(40px,5vw,80px);color:var(--cream)}
  .banquet .overlay .bq-label{grid-column:1;grid-row:1;align-self:start}
  .banquet .overlay .vlabel{position:absolute;left:clamp(20px,2.5vw,40px);top:clamp(36px,4vw,60px);writing-mode:vertical-rl;font-family:var(--jp);font-size:12px;letter-spacing:.6em;color:var(--gold-soft)}
  .banquet .overlay .eyebrow{color:var(--gold-soft)}
  .banquet .overlay .eyebrow::before{color:var(--gold-soft)}
  .banquet .overlay .h-en{color:var(--cream);margin-top:14px;font-size:clamp(20px,2vw,30px);font-weight:300;letter-spacing:.1em;line-height:1.2;opacity:.92;text-shadow:0 2px 30px rgba(0,0,0,0.45)}
  .banquet .overlay .jp-head{grid-column:2;grid-row:2;justify-self:end;align-self:end;text-align:right;position:relative;isolation:isolate;font-family:var(--jp);font-size:clamp(28px,3.4vw,46px);font-weight:500;letter-spacing:.14em;line-height:1.7;color:var(--cream);text-shadow:0 2px 26px rgba(0,0,0,0.7)}
  .banquet .overlay .jp-head::before{content:"";position:absolute;z-index:-1;inset:-34px -46px -42px -96px;background:linear-gradient(305deg, rgba(6,13,24,0.62) 0%, rgba(6,13,24,0.36) 48%, rgba(6,13,24,0.12) 72%, transparent 88%);filter:blur(14px);border-radius:46%;pointer-events:none}
  .banquet .overlay .jp-head .accent{color:var(--gold-soft)}
  .banquet .overlay .cap-chip{grid-column:2;grid-row:1;align-self:start;justify-self:end;border:1px solid rgba(244,239,230,.5);padding:14px 20px;display:flex;align-items:baseline;gap:14px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);background:rgba(8,18,32,0.18)}
  .banquet .overlay .cap-chip .n{font-family:var(--display);font-style:italic;font-size:34px;line-height:1;color:var(--cream)}
  .banquet .overlay .cap-chip .l{font-family:var(--sans);font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:rgba(244,239,230,.8)}

  .banquet .photo-cap{display:flex;justify-content:space-between;align-items:baseline;margin-top:18px;font-family:var(--sans);font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:#7b8294}
  .banquet .photo-cap .l{display:flex;align-items:center;gap:14px}
  .banquet .photo-cap .l::before{content:"";width:32px;height:1px;background:var(--gold)}
  .banquet .photo-cap em{font-family:var(--display);font-style:italic;text-transform:none;letter-spacing:.08em;color:var(--gold);font-size:14px}

  /* body below */
  .banquet .body-wrap{max-width:1480px;margin:90px auto 0;padding:0 56px;display:grid;grid-template-columns:0.85fr 1.15fr;gap:80px;align-items:start}
  .banquet .portrait{aspect-ratio:3/4;width:100%;background-image:url('assets/banquet-2.jpg');background-size:cover;background-position:center;box-shadow:0 24px 60px -30px rgba(20,12,4,0.4)}
  .banquet .body-text{display:flex;flex-direction:column;gap:48px;padding-top:30px}
  .banquet .quote-jp{font-family:var(--jp);font-size:clamp(22px,2vw,30px);line-height:2.05;letter-spacing:.14em;color:var(--ink);font-weight:400}
  .banquet .quote-jp .accent{color:var(--gold)}
  .banquet .body-jp{color:#3a4150;font-family:var(--jp)}

  @media (max-width: 980px){
    .banquet{padding:90px 0 80px}
    .banquet .frame{padding:0}
    /* photo on top, text below — readable on mobile */
    .banquet .photo{aspect-ratio:auto;background:none;box-shadow:none;overflow:visible}
    .banquet .photo::after{display:none}
    .banquet .photo::before{content:"";display:block;width:100%;height:64vw;max-height:430px;
      background-image:url('assets/banquet.jpg');background-size:cover;background-position:center}
    .banquet .overlay{position:static;display:flex;flex-direction:column;align-items:flex-start;gap:18px;
      color:var(--ink);padding:30px 24px 0;text-shadow:none}
    .banquet .overlay .vlabel{display:none}
    .banquet .overlay .bq-label{order:1}
    .banquet .overlay .jp-head{order:2}
    .banquet .overlay .cap-chip{order:3}
    .banquet .overlay .eyebrow{color:var(--gold);gap:10px}
    .banquet .overlay .eyebrow .ch-en{font-size:13px;letter-spacing:.28em}
    .banquet .overlay .h-en{color:var(--ink);opacity:1;text-shadow:none;font-size:21px;margin-top:10px;letter-spacing:.04em}
    .banquet .overlay .jp-head{position:static;text-align:left;justify-self:auto;align-self:auto;
      font-size:24px;line-height:1.7;letter-spacing:.04em;color:var(--ink);text-shadow:none}
    .banquet .overlay .jp-head::before{display:none}
    .banquet .overlay .jp-head .accent{color:var(--gold)}
    .banquet .overlay .cap-chip{justify-self:auto;align-self:flex-start;padding:12px 18px;
      border-color:var(--hair-dark);background:rgba(184,153,104,0.05);backdrop-filter:none;-webkit-backdrop-filter:none}
    .banquet .overlay .cap-chip .n{font-size:30px;color:var(--ink)}
    .banquet .overlay .cap-chip .l{color:#7b8294}
    .banquet .body-wrap{grid-template-columns:1fr;margin-top:54px;padding:0 24px;gap:42px}
    .banquet .body-wrap > .fade:first-child{display:none}
  }

  /* ---------- Ceremony ---------- */
  .ceremony{background:#FFFFFF;padding:180px 0 160px}
  .ceremony-head{max-width:1480px;margin:0 auto 110px;padding:0 56px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px;position:relative}
  .ceremony-head .h-en{margin-top:8px}
  .ceremony-head .h-jp{color:var(--ink);margin-top:4px}
  .ceremony-head .body-jp{max-width:38em;margin:14px auto 0;font-family:var(--jp);color:#3a4150}
  .ceremony-head .vlabel{position:absolute;left:36px;top:-40px;writing-mode:vertical-rl;font-family:var(--jp);font-size:12px;letter-spacing:.6em;color:var(--gold)}
  .ceremony-head .note{margin-top:18px;display:flex;align-items:center;justify-content:center;gap:14px;font-family:var(--jp);font-size:12px;letter-spacing:.2em;color:#4a5161}
  .ceremony-head .note::before{content:"";width:24px;height:1px;background:var(--gold)}
  .cer-rows{max-width:1480px;margin:0 auto;padding:0 56px;display:flex;flex-direction:column;gap:140px}
  .cer-row{display:grid;grid-template-columns:1.1fr 1fr;gap:80px;align-items:center}
  .cer-row.flip{grid-template-columns:1fr 1.1fr}
  .cer-row.flip .cer-photo{order:2}
  .cer-row.flip .cer-text{order:1}
  .cer-photo{aspect-ratio:5/4;background-size:cover;background-position:center;box-shadow:0 24px 60px -30px rgba(20,12,4,0.4);position:relative}
  .cer-row[data-id="cruise"]  .cer-photo{background-image:url('assets/ceremony-cruise.jpg')}
  .cer-row[data-id="chapel"]  .cer-photo{background-image:url('assets/ceremony-chapel.jpg')}
  .cer-row[data-id="banquet"] .cer-photo{background-image:url('assets/ceremony-banquet.jpg')}
  .cer-row[data-id="shrine"] .cer-photo{background-image:repeating-linear-gradient(45deg,#f1ede5 0 13px,#eae5db 13px 26px);display:flex;align-items:center;justify-content:center}
  .cer-row[data-id="shrine"] .cer-photo::after{content:"PHOTO — \5199\771F\5F8C\9001";font-family:var(--sans);font-size:11px;letter-spacing:.34em;color:#a99e8c}
  .cer-photo .badge{position:absolute;top:-1px;left:-1px;background:#FFFFFF;padding:14px 22px;display:flex;align-items:baseline;gap:14px;font-family:var(--display);letter-spacing:.04em}
  .cer-photo .badge .roman{font-style:italic;color:var(--gold);font-size:14px;letter-spacing:.3em}
  .cer-photo .badge .name{font-size:20px;color:var(--ink)}
  .cer-text{padding:20px 10px}
  .cer-text .tag{font-family:var(--display);font-style:italic;color:var(--gold);font-size:13px;letter-spacing:.35em;text-transform:uppercase;display:flex;align-items:center;gap:12px}
  .cer-text .tag::before{content:"";width:28px;height:1px;background:var(--gold)}
  .cer-text h3{margin-top:22px;font-family:var(--display);font-size:clamp(36px,4vw,60px);font-weight:300;letter-spacing:.04em;line-height:1.05;color:var(--ink)}
  .cer-text h3 em{font-style:italic;font-family:var(--serif)}
  .cer-text h3 .cer-no{font-family:var(--display);font-style:italic;font-size:.46em;color:var(--gold);margin-right:.42em;vertical-align:.22em;letter-spacing:.02em}
  .cer-text h3 .cer-no::after{content:"";display:inline-block;width:.7em;height:1px;background:var(--gold);vertical-align:.28em;margin-left:.42em}
  .cer-text .jp-head{margin-top:24px;font-family:var(--jp);font-size:clamp(18px,1.5vw,22px);letter-spacing:.18em;line-height:1.9;color:var(--ink)}
  .cer-text .desc{margin-top:28px;font-family:var(--jp);font-size:14px;letter-spacing:.12em;line-height:2.1;color:#3a4150;max-width:46ch}
  .cer-text .meta{margin-top:36px;padding-top:20px;border-top:1px solid var(--hair-dark);display:flex;justify-content:space-between;align-items:baseline;gap:30px;max-width:46ch}
  .cer-text .meta .l{font-family:var(--sans);font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:#7b8294}
  .cer-text .meta .v{font-family:var(--display);font-style:italic;font-size:22px;color:var(--ink)}

  @media (max-width: 980px){
    .ceremony-head{grid-template-columns:1fr;gap:30px;padding:0 22px}
    .cer-rows{display:flex;flex-direction:row;padding:4px 22px 20px;gap:16px;
      overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .cer-rows::-webkit-scrollbar{display:none}
    .cer-row,.cer-row.flip{display:flex;flex-direction:column;gap:18px;grid-template-columns:none;
      flex:0 0 80%;scroll-snap-align:center;align-items:stretch}
    .cer-row.flip .cer-photo{order:0}
    .cer-row.flip .cer-text{order:0}
    .cer-photo{aspect-ratio:4/3}
    .cer-text .desc{max-width:none}
    .cer-text .meta{max-width:none}
  }

  /* ---------- Cuisine ---------- */
  .cuisine{background:#FFFFFF;color:var(--ink);padding:160px 0;position:relative}
  .cuisine .wrap{max-width:1480px;margin:0 auto;padding:0 56px;display:grid;grid-template-columns:0.85fr 1.15fr;gap:48px 80px;align-items:start;position:relative}
  .cuisine .vlabel{position:absolute;left:36px;top:-40px;writing-mode:vertical-rl;font-family:var(--jp);font-size:12px;letter-spacing:.6em;color:var(--gold)}
  .cuisine .text{padding-top:36px;display:flex;flex-direction:column;gap:28px}
  .cuisine .text .eyebrow{color:var(--gold)}
  .cuisine .text .eyebrow::before{color:var(--gold)}
  .cuisine .text .h-en{color:var(--ink)}
  .cuisine .text .h-jp{color:var(--ink);margin-top:4px}
  .cuisine .text .body-jp{color:#3a4150;font-family:var(--jp)}
  .cuisine .custom-menu{margin-top:0;grid-column:1;border:1px solid var(--hair-dark);background:rgba(184,153,104,0.035)}
  .cuisine .custom-menu-head{display:flex;align-items:baseline;gap:16px;padding:15px 22px;border-bottom:1px solid var(--hair-dark)}
  .cuisine .cm-label{font-family:var(--sans);font-size:10px;letter-spacing:.42em;text-transform:uppercase;color:var(--gold)}
  .cuisine .cm-jp{font-family:var(--jp);font-size:12px;letter-spacing:.3em;color:#7b8294}
  .cuisine .cm-list{list-style:none;margin:0;padding:0}
  .cuisine .cm-list li{display:flex;align-items:baseline;gap:18px;padding:14px 22px;border-bottom:1px solid var(--hair-dark);transition:background .3s}
  .cuisine .cm-list li:hover{background:rgba(184,153,104,0.07)}
  .cuisine .cm-num{font-family:var(--display);font-style:italic;font-size:19px;line-height:1;color:var(--gold);min-width:26px;flex:0 0 auto}
  .cuisine .cm-txt{font-family:var(--jp);font-size:14px;letter-spacing:.14em;line-height:1.4;color:#3a4150}
  .cuisine .cm-foot{padding:15px 22px;font-family:var(--jp);font-size:12px;letter-spacing:.16em;line-height:1.7;color:#6a7180}
  .cuisine .cm-foot .accent{color:var(--gold)}

  .cuisine .carousel{position:relative}
  .cuisine .stage{aspect-ratio:5/4;width:100%;position:relative;overflow:hidden;background:#0E1A2B;box-shadow:0 24px 60px -30px rgba(20,12,4,0.4)}
  .cuisine .slide{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity 1.2s ease, transform 8s ease}
  .cuisine .slide.active{opacity:1;transform:scale(1.04)}
  .cuisine .slide-label{position:absolute;left:18px;bottom:18px;font-family:var(--display);font-style:italic;font-size:18px;color:#fff;letter-spacing:.05em;text-shadow:0 2px 12px rgba(0,0,0,.45);z-index:3}
  .cuisine .slide-label::before{content:"";display:inline-block;width:24px;height:1px;background:var(--gold-soft);margin-right:12px;vertical-align:middle}

  .cuisine .controls{display:flex;justify-content:space-between;align-items:center;margin-top:22px;padding-top:6px}
  .cuisine .counter{font-family:var(--display);font-size:22px;letter-spacing:.06em;color:var(--ink);display:flex;align-items:baseline;gap:14px}
  .cuisine .counter .now{font-style:italic;color:var(--gold)}
  .cuisine .counter .sep{width:48px;height:1px;background:var(--hair-dark);display:inline-block;transform:translateY(-6px)}
  .cuisine .counter .total{color:#7b8294;font-size:14px;letter-spacing:.2em}

  .cuisine .arrows{display:flex;gap:10px}
  .cuisine .arrow-btn{width:48px;height:48px;border:1px solid var(--ink);background:transparent;color:var(--ink);display:flex;align-items:center;justify-content:center;transition:all .35s;cursor:pointer;border-radius:0}
  .cuisine .arrow-btn:hover{background:var(--ink);color:#fff}
  .cuisine .arrow-btn svg{width:14px;height:14px}

  .cuisine .thumbs{margin-top:14px;display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
  .cuisine .thumb{aspect-ratio:1/1;background-size:cover;background-position:center;opacity:.4;transition:opacity .35s, transform .35s;cursor:pointer;border:0}
  .cuisine .thumb:hover{opacity:.75}
  .cuisine .thumb.active{opacity:1;outline:1px solid var(--gold);outline-offset:-1px}

  @media (max-width: 980px){
    .cuisine .wrap{grid-template-columns:1fr;gap:36px;padding:0 22px}
    .cuisine .vlabel{display:none}
    .cuisine .text{padding-top:0}
  }

  /* ---------- Dresses ---------- */
  .dresses{padding:180px 0 160px;background:#FFFFFF;position:relative;overflow:hidden}
  .dresses .head{max-width:1480px;margin:0 auto;padding:0 56px;display:grid;grid-template-columns:1fr 0.95fr;gap:80px;align-items:end;position:relative}
  .dresses .vlabel{position:absolute;left:36px;top:-40px;writing-mode:vertical-rl;font-family:var(--jp);font-size:12px;letter-spacing:.6em;color:var(--gold)}
  .dresses .head .text{display:flex;flex-direction:column;gap:28px;padding-bottom:30px}
  .dresses .head .eyebrow{color:var(--gold)}
  .dresses .head .eyebrow::before{color:var(--gold)}
  .dresses .head .h-en{color:var(--ink)}
  .dresses .head .h-jp{color:var(--ink)}
  .dresses .head .body-jp{color:#3a4150;font-family:var(--jp);max-width:50ch}
  .dresses .feature-ph{aspect-ratio:4/5;background-size:cover;background-position:center;background-image:url('assets/dress-main.jpg');box-shadow:0 24px 60px -30px rgba(20,12,4,0.4)}

  .dresses .gallery{max-width:1480px;margin:120px auto 0;padding:0 56px;display:grid;grid-template-columns:repeat(3, 1fr);gap:24px}
  .dresses .gallery .frame{aspect-ratio:3/4;background-size:cover;background-position:center;box-shadow:0 18px 40px -28px rgba(20,12,4,0.35);position:relative}
  .dresses .gallery .frame-main{display:none}
  .dresses .gallery .frame .num{position:absolute;top:-26px;left:0;font-family:var(--display);font-style:italic;font-size:14px;color:var(--gold);letter-spacing:.3em}
  .dresses .gallery .f1{transform:translateY(0)}
  .dresses .gallery .f2{transform:translateY(34px)}
  .dresses .gallery .f3{transform:translateY(16px)}

  .dresses .foot{max-width:1480px;margin:160px auto 0;padding:0 56px;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:end;border-top:1px solid var(--hair-dark);padding-top:50px}
  .dresses .moods{display:flex;flex-wrap:wrap;gap:10px}
  .dresses .moods span{font-family:var(--jp);font-size:13px;letter-spacing:.25em;padding:8px 18px;border:1px solid var(--hair-dark);border-radius:999px;color:#4a5161}
  .dresses .stats{display:flex;gap:60px;justify-self:end}
  .dresses .stats .n{font-family:var(--display);font-style:italic;font-size:54px;line-height:1;color:var(--gold)}
  .dresses .stats .l{font-family:var(--sans);font-size:10px;letter-spacing:.4em;text-transform:uppercase;margin-top:10px;color:#4a5161}

  @media (max-width: 980px){
    .dresses .head{grid-template-columns:1fr;gap:40px;padding:0 22px}
    .dresses .gallery{display:flex;grid-template-columns:none;padding:4px 22px 18px;margin-top:72px;gap:14px;
      overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .dresses .gallery::-webkit-scrollbar{display:none}
    .dresses .gallery .frame{transform:none!important;flex:0 0 64%;scroll-snap-align:center}
    .dresses .gallery .frame-main{display:block}
    .dresses .feature-ph{display:none}
    .dresses .foot{grid-template-columns:1fr;padding:30px 22px 0;gap:30px;margin-top:80px}
    .dresses .stats{justify-self:start;gap:30px}
  }

  /* ---------- Timeline ---------- */
  .timeline{background:#FFFFFF;padding:180px 0 200px;position:relative}
  .tl-head{max-width:1480px;margin:0 auto 110px;padding:0 56px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:22px;position:relative}
  .tl-head .vlabel{position:absolute;left:36px;top:-30px;writing-mode:vertical-rl;font-family:var(--jp);font-size:12px;letter-spacing:.6em;color:var(--gold)}
  .tl-head .h-jp{color:var(--ink);margin-top:6px}
  .tl{max-width:1100px;margin:0 auto;padding:0 56px;position:relative}
  .tl::before{content:"";position:absolute;left:50%;top:30px;bottom:30px;width:1px;background:linear-gradient(180deg, transparent 0%, var(--hair-dark) 8%, var(--hair-dark) 92%, transparent 100%);transform:translateX(-.5px)}
  .tl-row{position:relative;display:grid;grid-template-columns:1fr 1fr;gap:90px;padding:42px 0;align-items:start}
  .tl-row.right .tl-col-l:empty{visibility:hidden}
  .tl-row.left  .tl-col-r:empty{visibility:hidden}
  .tl-row::before{content:"";position:absolute;left:50%;top:54px;width:11px;height:11px;border:1px solid var(--gold);background:#FFFFFF;border-radius:50%;transform:translate(-50%,0);transition:all .4s;z-index:2}
  .tl-row:hover::before{background:var(--gold)}
  .tl-time{font-family:var(--display);font-style:normal;font-size:38px;line-height:1;color:#000000;letter-spacing:.04em}

  /* ---------- Fair ---------- */
  .fair{background:#FFFFFF;padding:180px 0 160px;position:relative;border-top:1px solid var(--hair-dark)}

  .fair .cal{}

  .fair-day{padding-top:6px}

  .fair-cta{display:inline-flex;align-items:center;gap:12px;font-family:var(--sans);font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink);white-space:nowrap;transition:color .3s}

    /* tighten oversized section rhythm */
    .concept{padding:88px 0 80px}
    .banquet{padding:84px 0}
    .ceremony{padding:92px 0 84px}
    .cuisine{padding:84px 0}
    .dresses{padding:92px 0 84px}
    .timeline{padding:92px 0 104px}
    .fair{padding:88px 0}
    .message{padding:92px 0 100px}
    footer{padding:76px 0 40px}

    /* shared heading scale-down */
    .h-jp{font-size:23px;letter-spacing:.06em;line-height:1.55}
    .h-en{font-size:17px;letter-spacing:.06em}
    .eyebrow{gap:11px}
    .eyebrow::before,.eyebrow::after{width:30px}
    .eyebrow .ch-en{font-size:14px;letter-spacing:.26em}
    .eyebrow .ch-jp{font-size:12.5px}
    .body-jp{font-size:14px;line-height:2.05;letter-spacing:.08em}

    /* concept */
    .concept .overlay{padding:26px 22px}
    .concept .overlay .h-en{font-size:16px}
    .concept .overlay .jp{font-size:19px;line-height:1.6}
    .concept .story-wrap{margin-top:48px;gap:36px}
    .concept .story-read .body-jp,
    .concept .story-read .lead{font-size:14.5px;line-height:2.1;letter-spacing:.08em}
    .concept .quote-jp{font-size:20px;line-height:1.95;letter-spacing:.08em}
    .concept .info-table-head{padding:13px 18px}
    .concept .it-row{grid-template-columns:90px 1fr;gap:12px;padding:13px 18px}
    .concept .it-row dd{font-size:13px}

    /* banquet */
    .banquet .overlay{padding:26px 22px}
    .banquet .overlay .jp-head{font-size:18px;line-height:1.5}
    .banquet .body-wrap{margin-top:48px;gap:36px}
    .banquet .quote-jp{font-size:20px;line-height:1.95}
    .banquet .body-text{gap:32px;padding-top:8px}

    /* ceremony */
    .ceremony-head{margin-bottom:56px}
    .cer-text{padding:0}
    .cer-text .tag{font-size:11px;letter-spacing:.28em;gap:10px}
    .cer-text .tag::before{width:22px}
    .cer-text h3{font-size:26px;margin-top:12px;line-height:1.05}
    .cer-text h3 .cer-no{font-size:.46em}
    .cer-text .jp-head{font-size:15px;margin-top:14px;line-height:1.8;letter-spacing:.1em}
    .cer-text .desc{font-size:13px;margin-top:14px;line-height:1.95;letter-spacing:.05em}
    .cer-text .meta{margin-top:18px;padding-top:14px;gap:16px}
    .cer-text .meta .v{font-size:18px}
    .cer-photo .badge{padding:9px 14px}
    .cer-photo .badge .name{font-size:16px}

    /* cuisine */
    .cuisine .text{padding:0!important;gap:22px}
    .cuisine .custom-menu{margin-top:0}
    .cuisine .cm-list li{padding:12px 16px;gap:14px}
    .cuisine .cm-txt{font-size:13px}
    .cuisine .counter{font-size:19px}
    .cuisine .arrow-btn{width:42px;height:42px}
    .cuisine .thumbs{gap:6px}

    /* dresses */
    .dresses .head .body-jp{font-size:14px}
    .dresses .gallery{margin-top:56px}
    .dresses .stats{gap:34px}
    .dresses .stats .n{font-size:38px}
    .dresses .moods span{font-size:12px;padding:7px 14px}

    /* timeline — clean stacked cards on phone */
    .tl-row .tl-col-l,.tl-row .tl-col-r{padding-left:0}
    .tl-row{padding:28px 0}
    .tl-time{display:block;font-size:30px;margin-bottom:2px}
    .tl-en{font-size:21px;margin-top:10px}
    .tl-jp{font-size:12.5px}
    .tl-note{font-size:15px;line-height:1.9;margin-top:16px}
    .tl-ph{margin-top:18px}
    .tl-aside-ph{margin-top:0}

    /* fair calendar */
    .fair .head{margin-bottom:48px}
    .cal-cell{font-size:15px}
    .fair-day-head .dd{font-size:36px}
    .fair-card .name{font-size:16px}
    .fair-card .time{font-size:14px}
    .fair-note{font-size:12.5px}

    /* message */
    .message .head{margin-bottom:60px}
    .message .body-col{margin-top:48px}
    .message .body-jp{font-size:14px;line-height:2.15}
    .message .sig{font-size:20px;margin-top:40px}

    /* footer */
    footer .brand-block .b1{font-size:30px}
    footer .brand-block .b3{margin-top:24px}
    .footer-end{margin-top:64px;flex-direction:column;gap:14px;align-items:flex-start}
  }

  /* ---------- Multi-page ---------- */
  .subpage{display:block}
  .subpage > section:first-of-type{padding-top:96px}
  .page-head{background:var(--night);color:var(--cream);padding:150px 0 62px;position:relative;overflow:hidden}
  .page-head::before{content:"";position:absolute;inset:0;background:radial-gradient(120% 90% at 82% 0%, rgba(140,109,43,0.22), transparent 55%);pointer-events:none}
  .page-head .wrap{position:relative}
  .ph-crumb{font-family:var(--sans);font-size:10px;letter-spacing:.34em;text-transform:uppercase;opacity:.72;display:flex;gap:12px;align-items:center}
  .ph-crumb a{color:var(--gold-soft)}
  .ph-crumb a:hover{color:var(--cream)}
  .ph-title{margin-top:22px;display:flex;align-items:baseline;gap:24px;flex-wrap:wrap}
  .ph-en{font-family:var(--display);font-weight:300;font-size:clamp(40px,6vw,84px);letter-spacing:.04em;line-height:1}
  .ph-en em{font-family:var(--serif);font-style:italic}
  .ph-jp{font-family:var(--jp);font-size:15px;letter-spacing:.3em;color:var(--gold-soft)}

  /* home scroll sequence (TRUNK-style) */
  .home-seq{background:#FFFFFF;position:relative;padding:60px 0 40px}
  .seq-index{position:fixed;right:40px;top:50%;transform:translateY(-50%);z-index:20;list-style:none;display:flex;flex-direction:column;gap:11px;pointer-events:none;mix-blend-mode:difference}
  .seq-index li{display:grid;grid-template-columns:18px 30px auto;align-items:center;gap:10px;font-family:var(--sans);font-size:12px;letter-spacing:.12em;color:rgba(255,255,255,.45);transition:color .4s ease}
  .seq-index li .si-ar{opacity:0;transform:translateX(-6px);transition:opacity .4s ease, transform .4s ease;font-size:13px}
  .seq-index li.on{color:#fff}
  .seq-index li.on .si-ar{opacity:1;transform:translateX(0)}
  .seq-index .si-no{font-variant-numeric:tabular-nums}

  .seq-item{max-width:1600px;margin:0 auto;padding:90px 40px 180px;position:relative;display:grid;grid-template-columns:1fr 56%;column-gap:0;align-items:start}
  .seq-item .seq-no{grid-column:1;grid-row:1;font-family:var(--display);font-size:16px;letter-spacing:.2em;color:var(--ink);opacity:0;transform:translateY(20px);transition:opacity .8s ease, transform .8s ease}
  .seq-title{grid-column:1 / -1;grid-row:1;display:block;position:relative;z-index:2;font-family:var(--display);font-weight:300;font-size:clamp(64px,12vw,190px);line-height:.92;letter-spacing:.01em;color:var(--ink);margin-top:4px;opacity:0;transform:translateY(40px);transition:opacity 1s ease .05s, transform 1s ease .05s}
  .seq-title:hover{color:#8a8f98}
  .seq-img{grid-column:2;grid-row:1 / span 2;align-self:start;width:100%;height:min(66vh,640px);background-size:cover;background-position:center;clip-path:inset(0 0 100% 0);transition:clip-path 1.1s cubic-bezier(.16,.84,.34,1)}
  .seq-title{margin-right:-16%}
  .seq-foot{grid-column:1;grid-row:2;display:flex;flex-direction:column;align-items:flex-start;gap:26px;margin-top:60px}
  .seq-lead{max-width:460px;font-family:var(--jp);font-size:15px;line-height:2.2;letter-spacing:.08em;color:#2c313b;opacity:0;transform:translateY(24px);transition:opacity .9s ease .15s, transform .9s ease .15s}
  .seq-more{font-family:var(--display);font-size:22px;letter-spacing:.04em;color:var(--ink);border-bottom:1px solid var(--ink);padding-bottom:4px;white-space:nowrap;opacity:0;transform:translateY(24px);transition:opacity .9s ease .2s, transform .9s ease .2s, color .3s}
  .seq-more:hover{color:var(--gold);border-color:var(--gold)}

  .seq-item.in .seq-no,.seq-item.in .seq-title,.seq-item.in .seq-lead,.seq-item.in .seq-more{opacity:1;transform:translateY(0)}
  .seq-item.in .seq-img{clip-path:inset(0 0 0 0)}
  .seq-cue{display:none}

  .seq-item.sm{padding:60px 40px 120px;grid-template-columns:1fr 40%}
  .seq-item.sm .seq-title{font-size:clamp(44px,7vw,104px);margin-right:-10%}
  .seq-item.sm .seq-img{height:min(44vh,420px)}
  .seq-item.sm .seq-lead{font-size:14px}
  .seq-item.sm .seq-more{font-size:19px}

  @media (max-width: 900px){
    .home-seq{padding:0}
    .seq-index{display:none}
    .seq-item,.seq-item.sm{display:flex;flex-direction:column;justify-content:flex-end;grid-template-columns:none;position:relative;min-height:100svh;padding:0 26px 64px;overflow:hidden;color:#fff}
    .seq-item .seq-img,.seq-item.sm .seq-img{position:absolute;inset:0;width:100%;height:100%;clip-path:none;z-index:0;opacity:1;transition:opacity .8s ease}
    .seq-item{background:#FFFFFF}
    .seq-item::after{content:"";position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(6,13,24,.25) 0%,rgba(6,13,24,.05) 40%,rgba(6,13,24,.78) 100%)}
    .seq-item[data-idx="0"] .seq-img{opacity:0}
    .seq-item[data-idx="0"].in .seq-img{opacity:1}
    .seq-item[data-idx="0"]::after{opacity:0;transition:opacity .8s ease}
    .seq-item[data-idx="0"].in::after{opacity:1}
    .seq-item .seq-no,.seq-item .seq-title,.seq-item .seq-foot{position:relative;z-index:2}
    .seq-item .seq-no{display:none}
    .seq-no{color:rgba(255,255,255,.85)}
    .seq-title,.seq-item.sm .seq-title{color:#fff;font-size:clamp(52px,17vw,88px);margin:6px 0 0}
    .seq-foot{display:flex;flex-direction:column;align-items:flex-start;gap:20px;margin-top:22px}
    .seq-lead,.seq-item.sm .seq-lead{color:rgba(255,255,255,.92);max-width:none;font-size:14px}
    .seq-more,.seq-item.sm .seq-more{color:#fff;border-color:rgba(255,255,255,.7);font-size:19px}
    .seq-item.in .seq-no,.seq-item.in .seq-title,.seq-item.in .seq-lead,.seq-item.in .seq-more{opacity:1;transform:none}
    .seq-cue{position:absolute;left:50%;bottom:22px;transform:translateX(-50%);z-index:2;width:1px;height:40px;background:linear-gradient(180deg,rgba(255,255,255,.9) 0%,transparent 100%);animation:drop 2.4s ease-in-out infinite}
    .seq-item:last-child .seq-cue{display:none}
  }

  /* home index */
  .home-index{background:#FFFFFF;padding:150px 0 160px}
  .home-index .hi-head{text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px;margin-bottom:78px}
  .home-index .hi-head .h-jp{color:var(--ink)}
  .hi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px}
  .hi-card{position:relative;aspect-ratio:3/4;overflow:hidden;background-size:cover;background-position:center;display:flex;flex-direction:column;justify-content:flex-end;color:var(--cream);box-shadow:0 24px 60px -30px rgba(20,12,4,0.4)}
  .hi-card::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,13,24,0.05) 28%,rgba(6,13,24,0.78) 100%);transition:opacity .55s}
  .hi-card:hover::after{opacity:.9}
  .hi-card .hi-body{position:relative;z-index:2;padding:26px 24px;transition:transform .55s ease}
  .hi-card:hover .hi-body{transform:translateY(-6px)}
  .hi-card .hi-no{font-family:var(--display);font-style:italic;font-size:12px;letter-spacing:.3em;color:var(--gold-soft)}
  .hi-card .hi-en{font-family:var(--display);font-size:28px;letter-spacing:.04em;margin-top:8px;line-height:1}
  .hi-card .hi-jp{font-family:var(--jp);font-size:12.5px;letter-spacing:.24em;margin-top:8px;opacity:.88}
  .hi-card .hi-arrow{margin-top:16px;display:inline-flex;align-items:center;gap:10px;font-family:var(--sans);font-size:9px;letter-spacing:.32em;text-transform:uppercase;opacity:.85}
  .hi-card .hi-arrow .a{width:22px;height:1px;background:currentColor;transition:width .45s ease}
  .hi-card:hover .hi-arrow .a{width:40px}

  /* page-to-page nav */
  .page-nav{max-width:1320px;margin:0 auto;border-top:1px solid var(--hair-dark);padding:56px 56px 110px;display:flex;justify-content:space-between;gap:30px}
  .page-nav a{display:flex;flex-direction:column;gap:8px;max-width:46%}
  .page-nav .pn-dir{font-family:var(--sans);font-size:9px;letter-spacing:.34em;text-transform:uppercase;color:var(--gold)}
  .page-nav .pn-en{font-family:var(--display);font-size:26px;color:var(--ink);letter-spacing:.03em;transition:color .3s}
  .page-nav a:hover .pn-en{color:var(--gold)}
  .page-nav .pn-jp{font-family:var(--jp);font-size:12px;letter-spacing:.2em;color:#7b8294}
  .page-nav .next{align-items:flex-end;text-align:right;margin-left:auto}

  @media (max-width: 980px){
    .hi-grid{grid-template-columns:repeat(2,1fr);gap:14px}
    .page-head{padding:104px 0 44px}
    .home-index{padding:88px 0 100px}
    .page-nav{padding:40px 22px 76px}
    .page-nav .pn-en{font-size:20px}
    .subpage > section:first-of-type{padding-top:70px}
  }
  @media (max-width: 560px){
    .hi-grid{grid-template-columns:1fr;gap:14px}
    .hi-card{aspect-ratio:16/10}
    .ph-title{gap:12px}
  }

  /* ---------- Concept page (text-forward) ---------- */
  .subpage > section.concept-page{padding:0}
  .concept-page{background:#FFFFFF;color:var(--ink)}
  .cp-pagetitle{text-align:center;padding:150px 24px 44px;font-family:var(--display);font-weight:300;font-size:clamp(36px,5vw,72px);letter-spacing:.24em;text-indent:.24em;text-transform:uppercase;color:var(--ink)}
  .cp-tophero{width:100%;height:min(66vh,640px);min-height:360px;background-size:cover;background-position:center}

  .cp-statement{max-width:1100px;margin:0 auto;padding:80px 56px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:26px}
  .cp-title{font-family:var(--jp);font-weight:500;font-size:clamp(30px,4.6vw,58px);letter-spacing:.14em;line-height:1.55;color:var(--ink)}

  .cp-lead-block{max-width:880px;margin:0 auto;padding:80px 56px 20px;text-align:center}
  .cp-lead-head{font-family:var(--jp);font-weight:500;font-size:clamp(22px,2.6vw,34px);letter-spacing:.12em;line-height:1.7;color:var(--ink)}
  #concept .cp-title{font-size:40px}
  #concept .cp-lead-head{font-size:25px}
  #banquet .cp-title{font-size:40px}
  #banquet .cp-lead-head{font-size:25px}
  #ceremony .cp-title{font-size:40px}
  #ceremony .cp-lead-head{font-size:25px}
  #cuisine .cp-title{font-size:40px}
  #cuisine .cp-lead-head{font-size:25px}
  #gallery .cp-title{font-size:40px}
  #faq .cp-title{font-size:40px}
  #dresses .cp-title{font-size:40px}
  #dresses .cp-lead-head{font-size:25px}

  /* campaign */
  #campaign .cmp-badge{font-family:var(--sans);font-size:11px;letter-spacing:.42em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
  #campaign .cp-title{font-size:clamp(30px,4vw,52px);line-height:1.5}
  #campaign .cmp-note{font-family:var(--jp);font-size:13px;letter-spacing:.08em;color:#7b8294;margin-top:8px}
  #campaign .cmp-sub{font-family:var(--jp);font-size:clamp(16px,2vw,22px);letter-spacing:.14em;color:var(--ink);margin-top:26px}
  .cmp-kv{max-width:1200px;margin:70px auto 0;height:min(60vh,560px);background-size:cover;background-position:center;box-shadow:0 26px 60px -34px rgba(20,12,4,.42)}
  .cmp-foot{max-width:900px;margin:60px auto 0;padding:0 40px;display:flex;flex-direction:column;align-items:center;gap:30px;text-align:center}
  .cmp-foot-label{font-family:var(--display);font-style:italic;font-size:18px;letter-spacing:.16em;color:var(--gold)}
  @media (max-width:900px){
    .cmp-kv{margin-top:48px;height:44vh;width:calc(100% - 44px)}
    .cmp-foot{margin-top:44px;padding:0 22px}
  }
  @media (max-width: 600px){
    #concept .cp-title,#banquet .cp-title,#ceremony .cp-title,#cuisine .cp-title,#dresses .cp-title,#gallery .cp-title,#faq .cp-title{font-size:29px}
    #concept .cp-lead-head,#banquet .cp-lead-head,#ceremony .cp-lead-head,#cuisine .cp-lead-head,#dresses .cp-lead-head{font-size:19px}
  }

  /* concept message block */
  .cp-message{max-width:900px;margin:130px auto 0;padding:0 40px;text-align:center}
  .cp-msg-en{font-family:var(--display);font-size:58px;letter-spacing:.06em;color:#0C0C0C}
  .cp-msg-head{margin-top:22px;font-family:var(--jp);font-weight:500;font-size:40px;letter-spacing:.1em;line-height:1.7;color:var(--ink)}
  .cp-msg-body{margin-top:46px;font-family:var(--jp);font-size:15px;line-height:2.5;letter-spacing:.09em;color:#3a4150}
  .cp-msg-body p{margin-bottom:1.7em}
  .cp-msg-body p:last-child{margin-bottom:0}
  @media (max-width:900px){
    .cp-message{margin-top:84px;padding:0 22px}
    .cp-msg-body{margin-top:32px;font-size:14px;line-height:2.3}
  }

  /* gallery */
  .gallery-grid{max-width:1280px;margin:80px auto 0;padding:0 40px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .gallery-cell{aspect-ratio:3/4;background-size:cover;background-position:center;box-shadow:0 20px 50px -32px rgba(20,12,4,0.4);transition:transform .6s cubic-bezier(.16,.84,.34,1)}
  .gallery-cell:hover{transform:scale(1.02)}

  /* faq accordion */
  .faq-list{max-width:900px;margin:70px auto 0;padding:0 40px}
  .faq-item{border-top:1px solid rgba(27,36,51,0.14)}
  .faq-item:last-child{border-bottom:1px solid rgba(27,36,51,0.14)}
  .faq-q{width:100%;background:none;border:0;cursor:pointer;display:flex;align-items:center;gap:24px;padding:30px 8px;text-align:left}
  .faq-no{font-family:var(--display);font-style:italic;font-size:20px;color:#000000;flex:0 0 auto}
  .faq-qt{flex:1;font-family:var(--jp);font-weight:500;font-size:17px;letter-spacing:.06em;line-height:1.6;color:var(--ink)}
  .faq-mark{position:relative;width:16px;height:16px;flex:0 0 auto}
  .faq-mark::before,.faq-mark::after{content:"";position:absolute;background:var(--ink);transition:transform .4s ease, opacity .4s ease}
  .faq-mark::before{top:50%;left:0;width:100%;height:1px;transform:translateY(-50%)}
  .faq-mark::after{left:50%;top:0;width:1px;height:100%;transform:translateX(-50%)}
  .faq-item.open .faq-mark::after{transform:translateX(-50%) scaleY(0)}
  .faq-a{overflow:hidden;transition:max-height .5s cubic-bezier(.16,.84,.34,1)}
  .faq-a p{padding:0 8px 32px 60px;font-family:var(--jp);font-size:14.5px;line-height:2.1;letter-spacing:.08em;color:#4a4f5a}

  @media (max-width: 780px){
    .gallery-grid{grid-template-columns:repeat(2,1fr);gap:10px;padding:0 22px;margin-top:52px}
    .faq-list{padding:0 22px;margin-top:48px}
    .faq-q{gap:16px;padding:24px 4px}
    .faq-a p{padding:0 4px 26px 40px}
  }
  .cp-lead-body{margin-top:46px;font-family:var(--jp);font-size:15px;line-height:2.5;letter-spacing:.1em;color:#4a4f5a}
  .cp-lead-body p{margin-bottom:1.9em}
  .cp-lead-body p:last-child{margin-bottom:0}

  .cp-features{max-width:1040px;margin:96px auto 0;padding:0 56px}
  .cp-feat{display:grid;grid-template-columns:auto minmax(0,600px);gap:24px 48px;justify-content:center;align-items:center;padding:70px 0;border-bottom:1px solid rgba(27,36,51,0.09)}
  .cp-feat:last-child{border-bottom:none}
  .cp-feat-no{font-family:var(--display);font-size:96px;line-height:.8;width:8px;height:8px;color:rgba(27,36,51,0.09);letter-spacing:.02em}
  .cp-feat-title{font-family:var(--jp);font-weight:500;font-size:20px;letter-spacing:.14em;line-height:1.75;color:var(--ink)}
  .cp-feat-body{margin-top:26px;font-family:var(--jp);font-size:14.5px;line-height:2.4;letter-spacing:.1em;color:#4a4f5a}

  .cp-links{max-width:1200px;margin:130px auto 0;padding:0 56px;display:grid;grid-template-columns:1fr 1fr}
  .cp-link{padding:24px 56px;text-align:center;display:flex;flex-direction:column;align-items:center;height:100%}
  .cp-link + .cp-link{border-left:1px solid rgba(27,36,51,0.12)}
  .cp-link-en{font-family:var(--display);font-weight:300;font-size:clamp(34px,4vw,58px);letter-spacing:.04em;color:var(--ink);line-height:1}

<style>
  #preloader{position:fixed;inset:0;z-index:9999;background:#FFFFFF;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;transition:opacity .7s ease;}
  #preloader.done{opacity:0;pointer-events:none;}
  #preloader .pre-logo{position:relative;text-align:center;}
  #preloader .pre-base{color:#D9DBDE;}
  #preloader .pre-b1{font-family:'Italiana','Cormorant Garamond',serif;font-weight:400;font-size:clamp(46px,9vw,96px);letter-spacing:.14em;line-height:1;}
  #preloader .pre-b2{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(22px,4vw,40px);letter-spacing:.16em;margin-top:14px;}
  #preloader .pre-fill{position:absolute;inset:0;overflow:hidden;color:#141E2E;clip-path:inset(calc(100% - var(--p,0%)) 0 0 0);}
  #preloader .pre-pct{display:none;}
</style>
</head>
<body>

<div id="preloader" aria-hidden="true">
  <div class="pre-logo">
    <div class="pre-base">
      <div class="pre-b1">T'SUKI</div>
      <div class="pre-b2">sur la mer</div>
    </div>
    <div class="pre-fill">
      <div class="pre-b1">T'SUKI</div>
      <div class="pre-b2">sur la mer</div>
    </div>
  </div>
  <div class="pre-pct">0</div>
</div>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="site.jsx"></script>

<script>
(function(){
  var pre = document.getElementById('preloader');
  if (!pre) return;
  var fill = pre.querySelector('.pre-fill');
  var pct = pre.querySelector('.pre-pct');
  var p = 0;
  var timer = setInterval(function(){
    p += Math.max(1, Math.round((100 - p) * 0.06));
    if (p >= 100) { p = 100; clearInterval(timer); finish(); }
    fill.style.setProperty('--p', p + '%');
    pct.textContent = p;
  }, 32);
  function finish(){
    try { window.scrollTo(0, 0); } catch(e){}
    setTimeout(function(){
      pre.classList.add('done');
      setTimeout(function(){ if (pre && pre.parentNode) pre.parentNode.removeChild(pre); }, 800);
    }, 320);
  }
})();
</script>

</body>
